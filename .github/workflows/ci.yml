name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --no-audit --no-fund --prefer-offline
      - run: npm run typecheck
      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --no-audit --no-fund --prefer-offline
      - run: npm run cf-build

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 15
    # Only run e2e on PRs (not every push to main) — PRs are the gate we
    # actually want. Catches regressions before merge; skips noisy post-merge
    # runs that can't re-block the branch anyway.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --no-audit --no-fund --prefer-offline
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Run Playwright e2e
        run: npx playwright test --project=chromium --reporter=list
        env:
          NEXT_TELEMETRY_DISABLED: '1'
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
