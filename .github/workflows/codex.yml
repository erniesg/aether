name: codex

# Local Codex intake — sister workflow to claude.yml.
#
# Routing convention (the dual-agent arbiter):
#   - Issue labeled `claude-run` → claude.yml fires, branches at `claude/issue-<n>-*`.
#   - Issue labeled `codex-run`  → THIS workflow watches for local Codex work,
#     branches at `codex/issue-<n>-*`, and opens/refreshes PRs.
#   - Both labels on the same issue: explicit user choice; both can run in
#     parallel. The first to ship a PR wins; the other's branch is left for
#     human review.
#   - Default routing rule (when neither label is set by the user):
#       The harness adds `claude-run` for primary work and `codex-run` only for
#       local Codex pickup, cross-review, or specific skills.
#
# Cost discipline:
#   - This workflow does NOT invoke Codex remotely and does NOT use an OpenAI
#     API key. Codex work happens locally, then a human/local agent pushes a
#     `codex/issue-<n>-*` branch.
#   - The repo-owned `.github/actions/local-codex-intake` action only handles
#     branch intake: refresh, PR creation fallback, and explicit CI/reviewer
#     dispatch for pushed Codex branches.
#   - The intake harness is always checked out from the default branch. Codex
#     branches never get to supply the workflow/action code that has write
#     permissions.
#   - Public GitHub writes are quiet during Singapore working hours by default:
#     set `AETHER_PUBLIC_WRITE_POLICY=always` only when public timestamps are OK.
#
# Cross-review pairing:
#   - claude-review.yml's branch regex matches both `claude/issue-*` AND
#     `codex/issue-*`, so a Codex-authored PR is reviewed by Claude and vice
#     versa. Mutual second-opinion without re-implementing the reviewer.

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Optional issue number to drain; omit to scan all queued codex/issue-* branches.
        required: false
        type: string
  schedule:
    # Runs from the default branch after Singapore working hours.
    - cron: '5,20,35,50 10-15 * * 1-5'
    - cron: '5,35 * * * 0,6'

jobs:
  codex:
    # Only spin up the runner when this is actually a codex-relevant event.
    # Without this guard, non-codex PRs would pollute the check list.
    if: |
      (github.event_name == 'issues' &&
        contains(github.event.issue.labels.*.name, 'codex-run')) ||
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@codex')) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@codex')) ||
      (github.event_name == 'pull_request' &&
        startsWith(github.event.pull_request.head.ref, 'codex/issue-')) ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
        github.ref_name == github.event.repository.default_branch)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write
      checks: read
      statuses: read
    env:
      AETHER_PUBLIC_WRITE_POLICY: ${{ vars.AETHER_PUBLIC_WRITE_POLICY || 'after-hours-sgt' }}
    steps:
      - name: Remote Codex execution disabled
        run: |
          echo "::notice::This workflow does not run remote Codex and does not use OpenAI API keys."
          echo "::notice::Run Codex locally, push codex/issue-<n>-*, then let this workflow open/refresh PRs and dispatch checks."

      - name: Checkout intake harness
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch || 'main' }}

      - name: Resolve agent target branch
        id: agent_target
        uses: ./.github/actions/local-codex-intake
        with:
          mode: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
          ISSUE_IS_PR: ${{ github.event.issue.pull_request && 'true' || 'false' }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number || '' }}
          PULL_REQUEST_HEAD_REF: ${{ github.event.pull_request.head.ref || '' }}
          REF_NAME: ${{ github.ref_name }}

      - name: Refresh existing PR branch from main
        if: steps.agent_target.outputs.existing_pr_branch != ''
        uses: ./.github/actions/local-codex-intake
        with:
          mode: refresh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          TARGET_BRANCH: ${{ steps.agent_target.outputs.existing_pr_branch }}
          TARGET_PR_NUMBER: ${{ steps.agent_target.outputs.existing_pr_number }}
          AETHER_PUBLIC_WRITE_POLICY: ${{ env.AETHER_PUBLIC_WRITE_POLICY }}

      - name: Local Codex branch intake
        uses: ./.github/actions/local-codex-intake
        with:
          mode: intake
        env:
          ISSUE_NUMBER: ${{ steps.agent_target.outputs.issue_number }}
          EXISTING_PR_BRANCH: ${{ steps.agent_target.outputs.existing_pr_branch }}
          REF_NAME: ${{ github.ref_name }}

      - name: Open PR for queued codex branch
        if: |
          always() &&
          github.event_name == 'issues' &&
          github.event.action == 'labeled'
        uses: ./.github/actions/local-codex-intake
        with:
          mode: open-pr
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ steps.agent_target.outputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title || '' }}
          EXISTING_PR_BRANCH: ${{ steps.agent_target.outputs.existing_pr_branch }}
          EXISTING_PR_NUMBER: ${{ steps.agent_target.outputs.existing_pr_number }}
          REF_NAME: ${{ github.ref_name }}
          AETHER_PUBLIC_WRITE_POLICY: ${{ env.AETHER_PUBLIC_WRITE_POLICY }}

      # GitHub does NOT trigger workflows when GITHUB_TOKEN-authored events
      # create PRs (anti-recursion guard). Mirror of the claude.yml dispatch
      # step so codex PRs get the same first-PR signal.
      - name: Dispatch CI + reviewer for fresh codex PRs
        if: |
          always() &&
          github.event_name == 'issues' &&
          github.event.action == 'labeled'
        uses: ./.github/actions/local-codex-intake
        with:
          mode: dispatch
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.agent_target.outputs.issue_number }}
          REF_NAME: ${{ github.ref_name }}
          AETHER_PUBLIC_WRITE_POLICY: ${{ env.AETHER_PUBLIC_WRITE_POLICY }}

      - name: Drain queued local Codex branches
        if: |
          always() &&
          (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: ./.github/actions/local-codex-intake
        with:
          mode: drain
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || '' }}
          AETHER_PUBLIC_WRITE_POLICY: ${{ env.AETHER_PUBLIC_WRITE_POLICY }}
