name: claude

# Autonomous Claude Code agent.
#   - Label an issue with `claude-run` OR mention @claude in a comment → agent fires.
#   - PR opened → agent reviews/responds.
# Guardrails live in docs/HACKATHON-OVERNIGHT-HANDOFF-2026-04-22.md; the agent
# reads it at the start of each run.

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to continue, usually from ci-failure-router.
        required: true
        type: string

jobs:
  claude:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: write
      checks: read
      statuses: read
    steps:
      - name: Resolve agent target branch
        id: agent_target
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number || '' }}
          ISSUE_IS_PR: ${{ github.event.issue.pull_request && 'true' || 'false' }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number || '' }}
          PULL_REQUEST_HEAD_REF: ${{ github.event.pull_request.head.ref || '' }}
        run: |
          set -euo pipefail

          checkout_ref=""
          existing_pr_branch=""
          existing_pr_number=""

          if [ -n "${PULL_REQUEST_HEAD_REF:-}" ]; then
            checkout_ref="${PULL_REQUEST_HEAD_REF}"
            existing_pr_branch="${PULL_REQUEST_HEAD_REF}"
            existing_pr_number="${PULL_REQUEST_NUMBER:-}"
          elif [ "${ISSUE_IS_PR:-false}" = "true" ] && [ -n "${ISSUE_NUMBER:-}" ]; then
            checkout_ref="$(gh api "repos/${GH_REPO}/pulls/${ISSUE_NUMBER}" --jq '.head.ref')"
            existing_pr_branch="${checkout_ref}"
            existing_pr_number="${ISSUE_NUMBER}"
          elif [ "${EVENT_NAME}" = "issues" ] && [ -n "${ISSUE_NUMBER:-}" ]; then
            match="$(gh pr list \
              --state open \
              --json number,headRefName,updatedAt \
              --jq "[.[] | select(.headRefName | startswith(\"claude/issue-${ISSUE_NUMBER}-\"))] | sort_by(.updatedAt) | reverse | .[0] // empty")"
            if [ -n "${match}" ]; then
              checkout_ref="$(printf '%s' "${match}" | jq -r '.headRefName')"
              existing_pr_branch="${checkout_ref}"
              existing_pr_number="$(printf '%s' "${match}" | jq -r '.number')"
            fi
          fi

          base_branch="${checkout_ref:-main}"
          {
            echo "checkout_ref=${checkout_ref}"
            echo "base_branch=${base_branch}"
            echo "existing_pr_branch=${existing_pr_branch}"
            echo "existing_pr_number=${existing_pr_number}"
          } >> "${GITHUB_OUTPUT}"

          if [ -n "${checkout_ref}" ]; then
            echo "::notice::Claude target branch resolved to ${checkout_ref}"
          else
            echo "::notice::No existing PR branch found; Claude will start from the event ref."
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.agent_target.outputs.checkout_ref || github.ref }}

      - name: Refresh existing PR branch from main
        if: steps.agent_target.outputs.existing_pr_branch != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: ${{ steps.agent_target.outputs.existing_pr_branch }}
          TARGET_PR_NUMBER: ${{ steps.agent_target.outputs.existing_pr_number }}
        run: |
          set -euo pipefail
          dispatch_pr_checks() {
            if [ -z "${TARGET_PR_NUMBER:-}" ]; then
              echo "::notice::No PR number resolved; skipping explicit check dispatch."
              return
            fi
            gh workflow run ci.yml --ref "${TARGET_BRANCH}"
            gh workflow run claude-review.yml --ref "${TARGET_BRANCH}" -f "pr_number=${TARGET_PR_NUMBER}"
            echo "::notice::Dispatched CI and reviewer workflows for PR #${TARGET_PR_NUMBER} on ${TARGET_BRANCH}."
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main "${TARGET_BRANCH}" --quiet
          git checkout -B "${TARGET_BRANCH}" "origin/${TARGET_BRANCH}"
          before="$(git rev-parse HEAD)"
          if git merge --no-edit origin/main; then
            after="$(git rev-parse HEAD)"
            if [ "${before}" != "${after}" ]; then
              git push origin "HEAD:${TARGET_BRANCH}"
              echo "::notice::Merged origin/main into ${TARGET_BRANCH} before Claude continued."
            else
              echo "::notice::${TARGET_BRANCH} already includes origin/main."
            fi
            dispatch_pr_checks
          else
            git merge --abort || true
            echo "::warning::Could not auto-merge origin/main into ${TARGET_BRANCH}; Claude will see the existing PR branch state."
          fi

      - name: Run Claude Code agent
        id: agent
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          # Subscription-backed OAuth token (not API credits).
          # Generated via `claude setup-token` on the maintainer's machine.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"
          label_trigger: "claude-run"
          base_branch: ${{ steps.agent_target.outputs.base_branch }}
          prompt: >-
            ${{ github.event_name == 'workflow_dispatch' && format('Continue issue #{0} from the latest automated handoff. First read the issue comments and linked PR comments, especially the latest CI failure repair packet; then fix the failing CI without asking for human help unless the packet says the retry budget is exhausted or the issue needs a product/architecture decision.', inputs.issue_number) || '' }}
          claude_args: |
            --max-turns 250
            --model claude-opus-4-7
            --allowedTools "Bash(npm install),Bash(npm ci),Bash(npm test:*),Bash(npm run typecheck),Bash(npm run build),Bash(npm run test:e2e:*),Bash(gh pr view:*),Bash(gh pr checks:*),Bash(gh issue view:*)"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_GEMINI_API_KEY: ${{ secrets.GOOGLE_GEMINI_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          VOLCENGINE_ARK_API_KEY: ${{ secrets.VOLCENGINE_ARK_API_KEY }}

      # Decouple PR creation from the agent's turn budget. Runs even when the
      # agent step hits --max-turns or errors out, as long as it successfully
      # pushed commits to a claude/issue-<n>-* branch. Opens a PR if none is
      # open yet for that branch. A no-op in every other case.
      - name: Open PR for pushed agent branch (budget-independent)
        if: always() && github.event_name == 'issues' && github.event.action == 'labeled'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          AGENT_OUTCOME: ${{ steps.agent.outcome }}
          EXISTING_PR_BRANCH: ${{ steps.agent_target.outputs.existing_pr_branch }}
          EXISTING_PR_NUMBER: ${{ steps.agent_target.outputs.existing_pr_number }}
        run: |
          set -u
          git fetch origin --prune --quiet
          BRANCH=$(git branch -r --list "origin/claude/issue-${ISSUE_NUMBER}-*" \
            | sed 's|^ *origin/||' \
            | sort -r \
            | head -n 1)
          if [ -z "${BRANCH:-}" ]; then
            echo "::notice::No claude/issue-${ISSUE_NUMBER}-* branch on origin — nothing to PR."
            exit 0
          fi

          if [ -n "${EXISTING_PR_BRANCH:-}" ]; then
            if [ "${BRANCH}" = "${EXISTING_PR_BRANCH}" ]; then
              echo "::notice::Existing PR branch ${EXISTING_PR_BRANCH} was the latest agent branch."
              exit 0
            fi

            git checkout -B "${EXISTING_PR_BRANCH}" "origin/${EXISTING_PR_BRANCH}"
            if git merge --ff-only "origin/${BRANCH}"; then
              git push origin "HEAD:${EXISTING_PR_BRANCH}"
              if [ -n "${EXISTING_PR_NUMBER:-}" ]; then
                gh pr comment "${EXISTING_PR_NUMBER}" --body "Merged follow-up agent branch \`${BRANCH}\` back into existing PR branch \`${EXISTING_PR_BRANCH}\`."
                gh workflow run ci.yml --ref "${EXISTING_PR_BRANCH}"
                gh workflow run claude-review.yml --ref "${EXISTING_PR_BRANCH}" -f "pr_number=${EXISTING_PR_NUMBER}"
              fi
              echo "::notice::Merged ${BRANCH} into existing PR branch ${EXISTING_PR_BRANCH}."
            else
              echo "::warning::Latest agent branch ${BRANCH} did not fast-forward ${EXISTING_PR_BRANCH}; leaving it for explicit follow-up."
            fi
            exit 0
          fi

          AHEAD=$(git rev-list --count "origin/main..origin/${BRANCH}")
          if [ "${AHEAD}" -eq 0 ]; then
            echo "::notice::Branch ${BRANCH} has 0 commits ahead of main — nothing to PR."
            exit 0
          fi
          if gh pr list --head "${BRANCH}" --state open --json number --jq 'length' | grep -qv '^0$'; then
            echo "::notice::PR already open for ${BRANCH}."
            exit 0
          fi
          BODY=$(cat <<BODY
          Auto-opened by \`claude.yml\` because the agent pushed ${AHEAD} commits to \`${BRANCH}\` but did not complete its own \`gh pr create\` step (agent step outcome: \`${AGENT_OUTCOME}\`).

          Closes #${ISSUE_NUMBER}.

          Review checklist:
          - CI must pass (typecheck · unit tests · e2e).
          - Automated reviewer comment surfaces in the timeline.
          - Read the agent's sticky comment on issue #${ISSUE_NUMBER} for its TDD log.

          🤖 Generated with [Claude Code](https://claude.com/claude-code)
          BODY
          )
          gh pr create \
            --title "${ISSUE_TITLE}" \
            --body "${BODY}" \
            --base main \
            --head "${BRANCH}"

      # GitHub does NOT trigger workflows when GITHUB_TOKEN-authored events
      # create PRs (anti-recursion guard). Without this step, ci.yml and
      # claude-review.yml never fire on fresh agent PRs — see #137 / #138
      # which only surfaced GitGuardian. We dispatch explicitly so the
      # PR has a verifiable signal from the moment it opens.
      - name: Dispatch CI + reviewer for fresh agent PRs
        if: always() && github.event_name == 'issues' && github.event.action == 'labeled'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -u
          # Find the most recent open PR whose head matches this issue's
          # agent-branch convention. Idempotent: if no open PR exists
          # (existing PR was already merged, or agent push silently no-op'd)
          # we exit cleanly.
          PR_JSON="$(gh pr list \
            --state open \
            --json number,headRefName \
            --jq "[.[] | select(.headRefName | startswith(\"claude/issue-${ISSUE_NUMBER}-\"))] | sort_by(.number) | reverse | .[0] // empty")"
          if [ -z "${PR_JSON:-}" ]; then
            echo "::notice::No open PR for issue #${ISSUE_NUMBER}; nothing to dispatch."
            exit 0
          fi
          PR_BRANCH="$(printf '%s' "${PR_JSON}" | jq -r '.headRefName')"
          PR_NUMBER="$(printf '%s' "${PR_JSON}" | jq -r '.number')"
          echo "::notice::Dispatching ci.yml + claude-review.yml for PR #${PR_NUMBER} on ${PR_BRANCH}"
          gh workflow run ci.yml --ref "${PR_BRANCH}" \
            || echo "::warning::ci.yml dispatch failed (workflow may not exist on this branch)"
          gh workflow run claude-review.yml --ref "${PR_BRANCH}" -f "pr_number=${PR_NUMBER}" \
            || echo "::warning::claude-review.yml dispatch failed"
