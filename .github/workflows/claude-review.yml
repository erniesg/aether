name: claude-review

# Fresh-context reviewer agent. Fires on PRs opened against `main` whose head
# branch matches `claude/issue-*` (author-agent PRs). Human-authored PRs are
# intentionally NOT reviewed here — they go through Codex + Ernie.
#
# Independence from the author comes from TWO things:
#   1. This is a separate Claude invocation with a fresh `/review --strict`
#      prompt — it does not inherit the author's conversation.
#   2. The head-branch guard + explicit prompt keep the reviewer from
#      reviewing its own review comments.
#
# Output contract: the reviewer structured output MUST include a `verdict`
# field set to one of APPROVE, REQUEST_CHANGES, or BLOCK.
#
# The `route-verdict` job reads the structured output, posts the PR comment,
# and dispatches labels + Discord notification. It still falls back to parsing
# an existing bot comment for older/manual runs.
#
# Active reviewer workflow. The GitHub App that authors agent PRs cannot
# safely self-modify this file; changes here should land through human/Codex
# review rather than author-agent branches.

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    # Only review agent-authored branches. Human PRs, and PRs opened by the
    # reviewer agent itself (it never pushes branches, but belt-and-braces),
    # are skipped.
    if: startsWith(github.event.pull_request.head.ref, 'claude/issue-')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run reviewer agent
        id: reviewer
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Plain-text review prompt. We previously used "/review --strict"
          # but claude-code-action@v1 doesn't recognize that as a built-in
          # slash command, so the agent no-opped and never produced a
          # VERDICT. Spelled-out prompt is the portable form.
          prompt: |
            You are the reviewer agent for this PR. You have NO prior context
            from the author — read the PR diff, the linked issue's acceptance
            criteria (look for "Closes #N" in the PR body), the test output,
            and any artifact URLs posted as PR comments. Do NOT attempt to
            modify code; you only comment.

            Apply STRICT review: red/green TDD compliance, hard rules from
            docs/AGENT-BRIEFING.md (provider seam, typed provenance, UI
            taxonomy, restraint, canvas-as-substrate), and the acceptance
            checklist from the linked issue. Flag any test that is mocked
            when it should be integration, any hardcoded provider, any UI
            mixing taxonomy categories.

            Return structured output only. Do not try to post a PR comment
            yourself; the routing step will post the review comment from your
            structured output. The `verdict` field must be exactly one of
            `APPROVE`, `REQUEST_CHANGES`, or `BLOCK`.

            Put the human-readable review in the `body` field. The router will
            append the final VERDICT line.

            - APPROVE: all acceptance criteria met, tests green, no hard-rule
              violations.
            - REQUEST_CHANGES: small fixable issues; the author agent will
              pick it up again.
            - BLOCK: architectural concern or spec violation that needs
              human resolution.
          claude_args: |
            --max-turns 120
            --model claude-opus-4-7
            --json-schema '{"type":"object","properties":{"verdict":{"type":"string","enum":["APPROVE","REQUEST_CHANGES","BLOCK"]},"body":{"type":"string","description":"Human-readable PR review summary and findings. Do not include the final VERDICT line."}},"required":["verdict","body"],"additionalProperties":false}'

      - name: Route verdict
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REVIEWER_STRUCTURED_OUTPUT: ${{ steps.reviewer.outputs.structured_output }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: '1496938045876731955'
        run: node .github/scripts/route-review-verdict.mjs
